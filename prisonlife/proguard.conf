# PrisonLife obfuscation - kodlar gizli kalir, config.yml/plugin.yml aynen kalir
-dontshrink
-dontoptimize
-keepattributes *Annotation*,Signature,InnerClasses,EnclosingMethod

# plugin.yml main sinifi korunmali
-keep public class com.prisonlife.PrisonLifePlugin {
    public *;
}

# Bukkit event handler metodlari korunmali
-keepclassmembers class * {
    @org.bukkit.event.EventHandler *;
}

# Enum'lar
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

-dontwarn org.bukkit.**
-dontwarn io.papermc.**
-dontwarn net.kyori.**
-dontwarn com.destroystokyo.**
-dontwarn org.spigotmc.**
-dontwarn org.jetbrains.**
-dontwarn org.intellij.**
-dontnote **
